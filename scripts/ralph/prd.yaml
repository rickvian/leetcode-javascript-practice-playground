- id: US-012
  title: Write expand_prd.py and seed the first batch window
  acceptanceCriteria:
  - Create scripts/ralph/expand_prd.py using ruamel.yaml (round-trip, preserves 
    formatting)
  - 'Script behavior: load prd.yaml + manifest.json, read manifest.expandedUpTo (default
    0), append the next 10 batch stories (title "Implement batch-NNN") + one Expand
    prd window story at the tail; bump manifest.expandedUpTo by 10; write both files
    atomically (write to .tmp and rename)'
  - Batch-story acceptance-criteria template and expand-story 
    acceptance-criteria template live inside expand_prd.py as triple-quoted 
    strings (single source of truth for future tweaks)
  - 'Batch-story template MUST invoke `python3 scripts/ralph/generate_tests.py --batch
    batch-NNN` as step 1; MUST NOT hand-author anything; commit message "feat [US-0XX]
    - Implement batch-NNN"'
  - 'Stop condition: if manifest.expandedUpTo already equals len(manifest.batches),
    the expand story outputs `<promise>COMPLETE</promise>` and marks itself passes
    true without appending further stories'
  - Run python3 scripts/ralph/expand_prd.py once in this story to seed US-013 
    through US-022 (batch-001 through batch-010) + US-023 (next expand)
  - Validate the seeded prd.yaml parses via js-yaml; confirm 11 new stories with
    priorities 13..23 and passes false
  - 'Commit with message: feat [US-012] - Write expand_prd.py and seed first batch
    window'
  priority: 12
  passes: true
  notes: Last prep story. After this runs, ralph iterates over US-013..US-022 
    (batches) then US-023 (next expand), which appends US-024..US-033 + US-034 
    (next expand), and so on until manifest is exhausted.
